experiment_name: sample_smoke
seed: 229

data:
  train_dir: data/sample/train
  test_dir: data/sample/test
  validation_fraction: 0.2
  max_validation: 2
  shuffle_files: false

model:
  channel_exponent: 2
  dropout: 0.0

training:
  iterations: 2
  batch_size: 2
  learning_rate: 0.0006
  decay_lr: false
  betas: [0.5, 0.999]
  weight_decay: 0.0
  device: auto

loss:
  type: physics
  pressure_weight: 1.0
  velocity_weight: 1.0
  physics_weight: 0.02

output:
  dir: outputs
  checkpoint_dir: checkpoints
  num_eval_figures: 2
